name: iOS build & TestFlight upload

on:
  push:
    tags:
      - 'v*'        # Tag like v1.0.0 → release build + TestFlight upload
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      upload:
        description: 'Upload to TestFlight'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      FLUTTER_VERSION: '3.41.8'
      XCODE_VERSION: '16.1'
      # ── Required GitHub secrets (Settings → Secrets → Actions) ──
      # APP_STORE_CONNECT_KEY_ID:        the "Key ID" from App Store Connect → Users and Access → Keys
      # APP_STORE_CONNECT_ISSUER_ID:     the "Issuer ID" on the same page
      # APP_STORE_CONNECT_KEY_BASE64:    base64 of the .p8 file you downloaded
      # MATCH_PASSWORD:                  password used to encrypt fastlane match certs
      # MATCH_GIT_URL:                   git URL of your private match certs repo (or use App Store Connect API for cert-less signing)
      # MATCH_GIT_TOKEN:                 PAT to clone the match repo
      BUNDLE_ID: com.tenthtone.tenthTone
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Install dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Analyze
        working-directory: flutter
        run: flutter analyze

      - name: Pod install
        working-directory: flutter/ios
        run: pod install --repo-update

      - name: Decode App Store Connect API key
        if: github.event.inputs.upload == 'true' || startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── Code signing — uses App Store Connect API (no fastlane match required) ──
      # Xcode 14+ supports automatic signing with API keys, no certs needed locally.
      - name: Build IPA (signed)
        if: github.event.inputs.upload == 'true' || startsWith(github.ref, 'refs/tags/v')
        working-directory: flutter
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/exportOptions.plist
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # Fallback: unsigned build for verification only
      - name: Build IPA (no codesign — verification only)
        if: github.event.inputs.upload != 'true' && !startsWith(github.ref, 'refs/tags/v')
        working-directory: flutter
        run: flutter build ios --release --no-codesign

      - name: Upload IPA artifact
        if: github.event.inputs.upload == 'true' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: flutter/build/ios/ipa/*.ipa
          retention-days: 14

      - name: Upload to TestFlight
        if: github.event.inputs.upload == 'true' || startsWith(github.ref, 'refs/tags/v')
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file flutter/build/ios/ipa/*.ipa \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
